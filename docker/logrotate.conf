/var/log/llm-gateway/*.log {
    # 每天轮转一次
    daily
    # 保留 30 天
    rotate 30
    # 如果日志文件不存在，不报错
    missingok
    # 日志文件为空时不轮转
    notifempty
    # 轮转后压缩
    compress
    # 延迟压缩（保留最近一次轮转的文件不压缩）
    delaycompress
    # 使用日期作为后缀（格式：.log-20260121）
    dateext
    dateformat -%Y%m%d
    # 轮转后的文件权限
    create 0644 nobody nobody
    # 轮转前后的命令
    sharedscripts
    postrotate
        # 重新打开日志文件（向 nginx master 进程发送 USR1 信号）
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}
