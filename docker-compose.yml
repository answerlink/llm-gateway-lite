services:
  llm-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '13030:8080'
    environment:
      - GATEWAY_CONFIG_DIR=/etc/llm-gateway/conf.d
      - TZ=Asia/Shanghai
      - GATEWAY_AUTH_ENABLED=false  # 是否启用客户端鉴权
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./configs:/etc/llm-gateway/conf.d:ro
      - ./logs:/var/log/llm-gateway
      - ./docker/entrypoint.sh:/app/entrypoint.sh:ro
      - ./nginx/nginx.conf:/app/nginx/nginx.conf:ro
      - ./nginx/conf.d/gateway.conf:/app/nginx/conf.d/gateway.conf:ro
      - ./lua/config/yaml.lua:/app/lua/config/yaml.lua:ro
      - ./lua/config/loader.lua:/app/lua/config/loader.lua:ro
      - ./lua/core/auth.lua:/app/lua/core/auth.lua:ro
      - ./lua/core/http_client.lua:/app/lua/core/http_client.lua:ro
      - ./lua/core/observe.lua:/app/lua/core/observe.lua:ro
      - ./lua/handlers/openai_compat.lua:/app/lua/handlers/openai_compat.lua:ro
      - ./lua/handlers/models.lua:/app/lua/handlers/models.lua:ro
      - ./lua/handlers/log.lua:/app/lua/handlers/log.lua:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"