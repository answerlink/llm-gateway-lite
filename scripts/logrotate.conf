# LLM Gateway 日志轮转配置
# 安装方法: sudo cp scripts/logrotate.conf /etc/logrotate.d/llm-gateway

/export/llmuser/projects/llm-gateway-lite/logs/*.log {
    # 轮转频率：每天
    daily
    
    # 保留天数：30 天
    rotate 30
    
    # 如果日志文件不存在，不报错
    missingok
    
    # 日志为空时不轮转
    notifempty
    
    # 压缩旧日志
    compress
    
    # 延迟一天压缩（保留昨天的未压缩，便于查看）
    delaycompress
    
    # 创建新文件的权限
    create 0644 root root
    
    # 所有日志共享脚本（只执行一次）
    sharedscripts
    
    # 轮转后执行的命令
    postrotate
        # 通知 nginx 重新打开日志文件
        /usr/bin/docker exec llm-gateway-lite-llm-gateway-1 nginx -s reopen 2>/dev/null || true
    endscript
}
