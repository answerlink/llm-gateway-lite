server {
  listen 8080;
  client_max_body_size 10m;

  set $upstream_url "";
  set $upstream_host "";
  set $upstream_host_header "";
  set $is_stream "false";
  set $stream_provider "";
  set $stream_provider_model "";
  set $stream_input_model "";
  set $stream_key_id "";
  set $stream_request_id "";

  location = /admin/stats {
    content_by_lua_file /app/lua/handlers/admin_stats.lua;
  }

  location = /admin/catalog {
    content_by_lua_file /app/lua/handlers/admin_catalog.lua;
  }

  location = /admin/dashboard {
    content_by_lua_file /app/lua/handlers/admin_dashboard.lua;
  }

  location = /admin/dashboard/topology {
    content_by_lua_file /app/lua/handlers/admin_topology.lua;
  }

  location = /admin/dashboard/config {
    content_by_lua_file /app/lua/handlers/admin_config_page.lua;
  }

  location = /admin/login {
    content_by_lua_file /app/lua/handlers/admin_login.lua;
  }

  location = /admin/configs {
    content_by_lua_file /app/lua/handlers/admin_config_api.lua;
  }

  location ~ ^/.*/chat/completions$ {
    content_by_lua_file /app/lua/handlers/chat_completions.lua;
  }

  location ~ ^/v[^/]+/embeddings$ {
    content_by_lua_file /app/lua/handlers/embeddings.lua;
  }

  location ~ ^/v[^/]+/models$ {
    content_by_lua_file /app/lua/handlers/models.lua;
  }

  location @proxy_stream {
    internal;
    proxy_pass $upstream_url;
    proxy_pass_request_headers on;
    proxy_pass_request_body on;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $upstream_host_header;
    proxy_ssl_server_name on;
    proxy_ssl_name $upstream_host;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 600s;
  }
}
