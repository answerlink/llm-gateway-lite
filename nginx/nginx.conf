worker_processes auto;
# 应用日志：记录所有级别（info 及以上），用于调试和追踪
error_log /var/log/llm-gateway/app.log info;
# 错误日志：只记录 warn 及以上级别，用于告警和快速排查
error_log /var/log/llm-gateway/error.log warn;
# 控制台输出：保持 info 级别，便于 docker logs 查看
error_log stderr info;
pid /var/run/nginx.pid;

# 明确声明需要继承的环境变量（让 Lua 可以访问）
env GATEWAY_CONFIG_DIR;
env GATEWAY_CONFIG_VERSION_DIR;
env GATEWAY_STATS_SNAPSHOT_PATH;
env GATEWAY_STATS_SNAPSHOT_INTERVAL_SEC;
env GATEWAY_AUTH_ENABLED;
env GATEWAY_RELOAD_INTERVAL_SEC;
env GATEWAY_KEY_COOLDOWN_SEC;
env GATEWAY_EXPOSE_SELECTION;
env GATEWAY_ADMIN_TOKEN;

events {
  worker_connections 1024;
}

http {
  include /usr/local/openresty/nginx/conf/mime.types;
  default_type application/octet-stream;

  lua_package_path '/app/lua/?.lua;/app/lua/?/init.lua;;';
  lua_shared_dict gateway_state 10m;
  lua_shared_dict gateway_rr 1m;

  init_by_lua_file /app/lua/init.lua;
  init_worker_by_lua_file /app/lua/init.lua;
  log_by_lua_file /app/lua/handlers/log.lua;

  access_log /var/log/llm-gateway/access.log;
  access_log /dev/stdout;
  
  # HTTP 块的错误日志（与顶层配置保持一致）
  error_log /var/log/llm-gateway/app.log info;
  error_log /var/log/llm-gateway/error.log warn;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 10m;

  resolver 1.1.1.1 8.8.8.8 ipv6=off;

  include /app/nginx/conf.d/*.conf;
}
